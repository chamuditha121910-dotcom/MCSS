<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCSS - Student Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <div class="logo-icon">M</div>
            <div class="logo-text">
                <span class="logo-title">MCSS</span>
                <span class="logo-subtitle">Marks Calculation & Student Statistics</span>
            </div>
        </a>

        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="analytics.html">Analytics</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>

        <div class="nav-actions">
            <button class="btn-icon" id="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle Theme">☀️</button>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Back Button -->
            <div style="margin-bottom: 1.5rem;">
                <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">
                    ← Back to Dashboard
                </a>
            </div>

            <!-- Profile Header -->
            <div id="profile-header">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Highest Subject Marks -->
            <div id="highest-marks" style="margin-bottom: 2rem;"></div>

            <!-- Performance Chart -->
            <h2 class="section-title">
                <span class="title-icon"></span>
                Performance Chart
            </h2>
            <div class="chart-container">
                <div class="chart-wrapper">
                    <canvas id="performance-chart"></canvas>
                </div>
            </div>

            <!-- Term Analysis Table -->
            <div id="term-table" style="margin-bottom: 2rem;"></div>

            <!-- A/L Predictions -->
            <div id="predictions"></div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/script.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
